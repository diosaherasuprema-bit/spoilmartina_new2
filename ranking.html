<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Collectors — Martina Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#04020a;color:#fce4ef;font-family:'Space Mono',monospace;}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(4,2,10,.95),transparent);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;color:#fce4ef;text-decoration:none;}
.nav-logo span{color:#e8457a;}
.nav-links{display:flex;gap:20px;}
.nav-links a{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,69,122,.6);text-decoration:none;transition:color .3s;}
.nav-links a:hover{color:#fce4ef;}

.page{position:relative;z-index:1;padding:100px 24px 80px;max-width:680px;margin:0 auto;}

.header{text-align:center;margin-bottom:48px;}
.header-eyebrow{font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:rgba(232,69,122,.55);margin-bottom:12px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,10vw,80px);letter-spacing:.04em;line-height:.9;color:#fce4ef;}
.header-title span{color:#e8457a;}
.header-sub{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:rgba(252,228,239,.3);margin-top:12px;}

/* TOP 3 PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:48px;}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:8px;}
.podium-card{
  padding:20px 16px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border:1px solid rgba(232,69,122,.15);
  position:relative;overflow:hidden;
  min-width:120px;
}
.podium-item:nth-child(2) .podium-card{
  border-color:rgba(240,192,64,.4);
  background:rgba(240,192,64,.04);
  box-shadow:0 0 30px rgba(240,192,64,.15);
}
.podium-rank{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
.podium-item:nth-child(1) .podium-rank{color:#a0a0b0;}
.podium-item:nth-child(2) .podium-rank{color:#f0c040;text-shadow:0 0 12px rgba(240,192,64,.5);}
.podium-item:nth-child(3) .podium-rank{color:#c0804040;}
.podium-item:nth-child(1) .podium-rank{color:#c0c0d0;}
.podium-item:nth-child(3) .podium-rank{color:#c08040;}
.podium-name{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#fce4ef;text-align:center;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.podium-stat{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#e8457a;}
.podium-stat-lbl{font-size:6px;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,69,122,.5);}
.podium-bar{width:100%;background:rgba(232,69,122,.1);}
.podium-item:nth-child(2) .podium-bar{height:60px;}
.podium-item:nth-child(1) .podium-bar{height:36px;}
.podium-item:nth-child(3) .podium-bar{height:20px;}

/* RANKING TABLE */
.ranking-table{width:100%;border-collapse:collapse;}
.ranking-table thead tr{border-bottom:1px solid rgba(232,69,122,.2);}
.ranking-table th{padding:12px 16px;font-size:7px;letter-spacing:.35em;text-transform:uppercase;color:rgba(232,69,122,.5);text-align:left;font-weight:400;}
.ranking-table tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .2s;}
.ranking-table tbody tr:hover{background:rgba(232,69,122,.04);}
.ranking-table td{padding:14px 16px;font-size:11px;}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(252,228,239,.4);width:40px;}
.rank-num.top1{color:#f0c040;text-shadow:0 0 8px rgba(240,192,64,.4);}
.rank-num.top2{color:#c0c0d0;}
.rank-num.top3{color:#c08040;}
.collector-name{color:#fce4ef;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.packs-count{color:rgba(232,69,122,.7);font-family:'Bebas Neue',sans-serif;font-size:18px;}
.cards-count{color:rgba(252,228,239,.5);font-family:'Bebas Neue',sans-serif;font-size:18px;}
.leg-count{font-family:'Bebas Neue',sans-serif;font-size:18px;}
.leg-count.has{color:#f0c040;}
.leg-count.none{color:rgba(252,228,239,.2);}

/* TWITTER SHARE */
.share-section{margin-top:48px;padding:24px;border:1px solid rgba(232,69,122,.15);text-align:center;}
.share-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;margin-bottom:8px;}
.share-sub{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(252,228,239,.3);margin-bottom:16px;}
.btn-tweet{display:inline-block;padding:12px 28px;background:#1da1f2;color:#fff;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;text-decoration:none;transition:background .3s;}
.btn-tweet:hover{background:#0d8fd9;}

/* CTA */
.cta-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:13px 40px;background:#e8457a;color:#04020a;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;white-space:nowrap;box-shadow:0 0 34px rgba(232,69,122,.4);animation:bp 2.5s ease infinite;}
@keyframes bp{0%,100%{box-shadow:0 0 34px rgba(232,69,122,.33);}50%{box-shadow:0 0 60px rgba(232,69,122,.65);}}

.loading{text-align:center;padding:60px;color:rgba(232,69,122,.5);font-size:8px;letter-spacing:.4em;text-transform:uppercase;}
.empty{text-align:center;padding:60px;}
.empty-icon{font-size:40px;opacity:.3;margin-bottom:12px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:rgba(252,228,239,.4);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav>
  <a href="/" class="nav-logo">MARTINA <span>🦂</span></a>
  <div class="nav-links">
    <a href="/album">My Album</a>
    <a href="/drop-rates">Drop Rates</a>
    <a href="/">Open Packs</a>
  </div>
</nav>

<div class="page">
  <div class="header">
    <div class="header-eyebrow">Martina Collection · Season 01</div>
    <h1 class="header-title">Top <span>Collectors</span></h1>
    <div class="header-sub" id="headerSub">Loading...</div>
  </div>

  <div id="podiumWrap" class="podium" style="display:none"></div>

  <div id="tableWrap" style="display:none">
    <table class="ranking-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Collector</th>
          <th>Packs</th>
          <th>Cards</th>
          <th>⭐</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </div>

  <div id="loadingEl" class="loading">Loading ranking...</div>
  <div id="emptyEl" class="empty" style="display:none">
    <div class="empty-icon">🦂</div>
    <div class="empty-title">No collectors yet</div>
  </div>

  <div class="share-section" id="shareSection" style="display:none">
    <div class="share-title">Are you on the list? 🦂</div>
    <div class="share-sub">Share your collection on Twitter</div>
    <a id="tweetBtn" href="#" target="_blank" class="btn-tweet">🐦 Tweet my rank</a>
  </div>
</div>

<a href="/" class="cta-fixed">🦂 Open a pack — €15</a>

<script>
// BG
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
bgC.width=window.innerWidth;bgC.height=Math.max(window.innerHeight,2000);
const pts=Array.from({length:50},()=>({x:Math.random()*bgC.width,y:Math.random()*bgC.height,s:Math.random()*1.5+.3,vy:-(Math.random()*.35+.1),op:Math.random()*.35+.1,life:Math.random()*200}));
(function ab(){bgX.clearRect(0,0,bgC.width,bgC.height);pts.forEach(p=>{bgX.save();bgX.globalAlpha=p.op;bgX.fillStyle='#e8457a';bgX.shadowBlur=8;bgX.shadowColor='#e8457a';bgX.beginPath();bgX.arc(p.x,p.y,p.s,0,Math.PI*2);bgX.fill();bgX.restore();p.y+=p.vy;p.life++;if(p.y<-5||p.life>260){p.y=bgC.height+5;p.x=Math.random()*bgC.width;p.life=0;}});requestAnimationFrame(ab);})();

async function loadRanking(){
  try {
    const res = await fetch('/api/ranking');
    const data = await res.json();
    const collectors = data.collectors || [];

    document.getElementById('loadingEl').style.display='none';

    if(!collectors.length){
      document.getElementById('emptyEl').style.display='block';
      return;
    }

    document.getElementById('headerSub').textContent = `${collectors.length} collectors · Season 01`;

    // PODIUM top 3
    if(collectors.length >= 3){
      const podium = document.getElementById('podiumWrap');
      podium.style.display='flex';
      const order = [collectors[1], collectors[0], collectors[2]]; // 2nd, 1st, 3rd
      const ranks = ['2nd','1st','3rd'];
      const heights = ['80px','110px','60px'];
      order.forEach((c,i) => {
        if(!c) return;
        podium.innerHTML += `
          <div class="podium-item">
            <div class="podium-card">
              <div class="podium-rank">${ranks[i]}</div>
              <div class="podium-name">${c.name}</div>
              <div class="podium-stat">${c.legendaries}</div>
              <div class="podium-stat-lbl">⭐ legendaries</div>
            </div>
            <div class="podium-bar" style="height:${heights[i]}"></div>
          </div>`;
      });
    }

    // TABLE
    const tbody = document.getElementById('rankingBody');
    document.getElementById('tableWrap').style.display='block';
    collectors.forEach(c => {
      const rankClass = c.rank===1?'top1':c.rank===2?'top2':c.rank===3?'top3':'';
      tbody.innerHTML += `
        <tr>
          <td class="rank-num ${rankClass}">${c.rank}</td>
          <td class="collector-name">${c.name}</td>
          <td class="packs-count">${c.packs_opened}</td>
          <td class="cards-count">${c.total_cards}</td>
          <td class="leg-count ${c.legendaries>0?'has':'none'}">${c.legendaries>0?'⭐'.repeat(Math.min(c.legendaries,5)):'-'}</td>
        </tr>`;
    });

    // Check if current user is in ranking
    const meRes = await fetch('/auth/me');
    const meData = await meRes.json();
    if(meData.user){
      const myRank = collectors.find(c => c.name === (meData.user.displayName || meData.user.email));
      const shareSection = document.getElementById('shareSection');
      shareSection.style.display='block';
      const tweetText = myRank
        ? `I'm #${myRank.rank} on Martina Collection with ${myRank.legendaries} ⭐ legendaries! 🦂 Can you beat me? spoilmartinanew2-production.up.railway.app`
        : `Just opened a pack on Martina Collection 🦂 spoilmartinanew2-production.up.railway.app`;
      document.getElementById('tweetBtn').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`;
    }

  } catch(e) {
    document.getElementById('loadingEl').textContent = 'Error loading ranking.';
    console.error(e);
  }
}

loadRanking();
</script>
</body>
</html>
