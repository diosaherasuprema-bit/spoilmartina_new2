<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Martina Collection — Open your pack</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#04020a;color:#fce4ef;font-family:'Space Mono',monospace;overflow:hidden;touch-action:none;user-select:none;}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
#flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:9999;transition:opacity .15s;}
.sparkle{position:fixed;pointer-events:none;z-index:9998;font-size:18px;animation:sFly .9s ease forwards;}
@keyframes sFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:10;}
.screen.hidden{display:none;}

/* LOADING */
#loading{gap:16px;}
.loading-spinner{width:40px;height:40px;border:2px solid rgba(232,69,122,.2);border-top-color:#e8457a;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:rgba(232,69,122,.6);}

/* Cards screen — same as main page */
#cards-screen{background:radial-gradient(ellipse at 50% 30%,rgba(232,69,122,.07) 0%,transparent 55%);}
.card-area{width:200px;height:300px;perspective:900px;}
.card-3d{width:200px;height:300px;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.16,1,.3,1);}
.card-3d.flipped{transform:rotateY(180deg);}
.card-face,.card-back-wrap{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;overflow:hidden;}
.card-face{transform:rotateY(180deg);}
.card-face img{width:100%;height:100%;object-fit:cover;display:block;}
.card-glow{position:absolute;inset:0;}
.card-badge{position:absolute;top:9px;right:9px;padding:3px 9px;border-radius:20px;font-size:7px;letter-spacing:.2em;text-transform:uppercase;}
.card-bot{position:absolute;bottom:0;left:0;right:0;padding:16px 11px 11px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.06em;color:#fff;}
.rarity-common .card-face{border:2px solid rgba(160,176,192,.4);}
.rarity-common .card-glow{background:linear-gradient(135deg,rgba(160,176,192,.12),transparent);}
.rarity-common .card-badge{background:rgba(160,176,192,.12);color:#a0b0c0;border:1px solid rgba(160,176,192,.35);}
.rarity-rare .card-face{border:2px solid rgba(64,144,255,.6);box-shadow:0 0 18px rgba(64,144,255,.2);}
.rarity-rare .card-glow{background:linear-gradient(135deg,rgba(64,144,255,.18),transparent);}
.rarity-rare .card-badge{background:rgba(64,144,255,.12);color:#4090ff;border:1px solid rgba(64,144,255,.5);}
.rarity-epic .card-face{border:2px solid rgba(192,96,255,.7);box-shadow:0 0 26px rgba(192,96,255,.3);}
.rarity-epic .card-glow{background:linear-gradient(135deg,rgba(192,96,255,.2),transparent);}
.rarity-epic .card-badge{background:rgba(192,96,255,.12);color:#c060ff;border:1px solid rgba(192,96,255,.55);}
.rarity-legendary .card-face{border:2px solid #f0c040;box-shadow:0 0 36px rgba(240,192,64,.45),0 0 70px rgba(240,192,64,.12);}
.rarity-legendary .card-glow{background:linear-gradient(135deg,rgba(240,192,64,.2),transparent);}
.rarity-legendary .card-badge{background:rgba(240,192,64,.12);color:#f0c040;border:1px solid rgba(240,192,64,.65);}
.rarity-legendary .card-face::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 20%,rgba(240,192,64,.2) 50%,transparent 80%);animation:lgS 2s ease infinite;}
@keyframes lgS{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
.cb-common{background:linear-gradient(135deg,#120428,#1e0840,#120428);border:2px solid rgba(160,176,192,.25);}
.cb-rare{background:linear-gradient(135deg,#020a30,#0428a0,#061460,#020830);border:2px solid rgba(64,144,255,.55);box-shadow:0 0 20px rgba(64,144,255,.3),inset 0 0 28px rgba(64,144,255,.15);}
.cb-epic{background:linear-gradient(135deg,#180430,#5010a0,#280650,#100228);border:2px solid rgba(192,96,255,.65);box-shadow:0 0 25px rgba(192,96,255,.4),inset 0 0 28px rgba(192,96,255,.2);}
.cb-legendary{background:linear-gradient(135deg,#1a0500,#703808,#281000,#100300);border:2px solid rgba(240,192,64,.75);box-shadow:0 0 35px rgba(240,192,64,.5),0 0 70px rgba(240,192,64,.15),inset 0 0 28px rgba(240,192,64,.2);}
.cb-rays{position:absolute;inset:-50%;width:200%;height:200%;animation:rRot 6s linear infinite;pointer-events:none;}
.cb-rare .cb-rays{background:conic-gradient(from 0deg,transparent 0deg,rgba(64,144,255,.06) 15deg,transparent 60deg,rgba(64,144,255,.06) 120deg,transparent 180deg,rgba(64,144,255,.06) 240deg,transparent 300deg,rgba(64,144,255,.06) 360deg);}
.cb-epic .cb-rays{background:conic-gradient(from 0deg,transparent 0deg,rgba(192,96,255,.07) 15deg,transparent 60deg,rgba(192,96,255,.07) 120deg,transparent 180deg,rgba(192,96,255,.07) 240deg,transparent 300deg,rgba(192,96,255,.07) 360deg);}
.cb-legendary .cb-rays{background:conic-gradient(from 0deg,transparent 0deg,rgba(240,192,64,.1) 12deg,transparent 48deg,rgba(240,192,64,.1) 96deg,transparent 144deg,rgba(240,192,64,.1) 192deg,transparent 240deg,rgba(240,192,64,.1) 288deg,transparent 336deg,rgba(240,192,64,.1) 360deg);}
@keyframes rRot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.cb-pat{position:absolute;inset:0;opacity:.1;}
.cb-common .cb-pat{background:repeating-linear-gradient(45deg,rgba(160,176,192,.5) 0,rgba(160,176,192,.5) 1px,transparent 1px,transparent 8px);}
.cb-rare .cb-pat{background:repeating-linear-gradient(45deg,rgba(64,144,255,.5) 0,rgba(64,144,255,.5) 1px,transparent 1px,transparent 8px);}
.cb-epic .cb-pat{background:repeating-linear-gradient(45deg,rgba(192,96,255,.5) 0,rgba(192,96,255,.5) 1px,transparent 1px,transparent 8px);}
.cb-legendary .cb-pat{background:repeating-linear-gradient(45deg,rgba(240,192,64,.5) 0,rgba(240,192,64,.5) 1px,transparent 1px,transparent 8px);}
.cb-sweep{position:absolute;inset:0;animation:holoS 3s ease infinite;mix-blend-mode:screen;}
.cb-common .cb-sweep{background:linear-gradient(110deg,transparent 20%,rgba(160,176,192,.1) 50%,transparent 80%);}
.cb-rare .cb-sweep{background:linear-gradient(110deg,transparent 20%,rgba(64,144,255,.28) 50%,transparent 80%);}
.cb-epic .cb-sweep{background:linear-gradient(110deg,transparent 20%,rgba(192,96,255,.3) 50%,transparent 80%);}
.cb-legendary .cb-sweep{background:linear-gradient(110deg,transparent 20%,rgba(240,192,64,.38) 50%,transparent 80%);}
.cb-frame{position:absolute;inset:8px;border-radius:8px;}
.cb-common .cb-frame{border:1px solid rgba(160,176,192,.2);}
.cb-rare .cb-frame{border:1px solid rgba(64,144,255,.3);}
.cb-epic .cb-frame{border:1px solid rgba(192,96,255,.35);}
.cb-legendary .cb-frame{border:1px solid rgba(240,192,64,.45);box-shadow:0 0 8px rgba(240,192,64,.2),inset 0 0 8px rgba(240,192,64,.1);}
.cb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;z-index:2;}
@keyframes holoS{0%,100%{transform:translateX(-40%) skewX(-8deg);}50%{transform:translateX(40%) skewX(8deg);}}
.card-ctr{font-size:9px;letter-spacing:.3em;color:rgba(245,160,192,.65);margin-top:15px;}
.dots{display:flex;gap:7px;margin-top:12px;}
.dot{width:7px;height:7px;border-radius:50%;background:#2a1020;transition:all .3s;}
.dot.on{background:#e8457a;box-shadow:0 0 7px #e8457a;}
.btn{margin-top:17px;padding:12px 36px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;background:#e8457a;color:#04020a;border:none;cursor:pointer;transition:background .3s;}
.btn:hover{background:#c02860;}

/* SPECIAL REVEAL */
#special-screen{background:#04020a;z-index:100;}
.sp-rays{position:absolute;inset:-50%;width:200%;height:200%;animation:rRot 8s linear infinite;pointer-events:none;}
.sp-rays.gold{background:conic-gradient(from 0deg,transparent 0deg,rgba(240,192,64,.13) 12deg,transparent 48deg,rgba(240,192,64,.13) 96deg,transparent 144deg,rgba(240,192,64,.13) 192deg,transparent 240deg,rgba(240,192,64,.13) 288deg,transparent 336deg,transparent 360deg);}
.sp-rays.purple{background:conic-gradient(from 0deg,transparent 0deg,rgba(192,96,255,.11) 12deg,transparent 48deg,rgba(192,96,255,.11) 96deg,transparent 144deg,rgba(192,96,255,.11) 192deg,transparent 240deg,rgba(192,96,255,.11) 288deg,transparent 336deg,transparent 360deg);}
.sp-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;height:420px;border-radius:50%;animation:spGlP 1.5s ease infinite;pointer-events:none;}
.sp-glow.gold{background:radial-gradient(circle,rgba(240,192,64,.35) 0%,rgba(240,192,64,.08) 40%,transparent 70%);}
.sp-glow.purple{background:radial-gradient(circle,rgba(192,96,255,.3) 0%,rgba(192,96,255,.06) 40%,transparent 70%);}
@keyframes spGlP{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.12);}}
.sp-lbl{position:absolute;top:52px;left:0;right:0;text-align:center;z-index:5;}
.sp-type{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.55em;animation:spIn .7s ease both;}
.sp-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.08em;animation:spIn .7s ease .15s both;}
@keyframes spIn{from{opacity:0;transform:translateY(-12px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
.sp-card{position:relative;z-index:5;width:190px;height:285px;border-radius:13px;overflow:hidden;animation:spCIn 1s cubic-bezier(.16,1,.3,1) .25s both;}
@keyframes spCIn{from{opacity:0;transform:scale(.4) translateY(80px);}to{opacity:1;transform:scale(1) translateY(0);}}
.sp-card img{width:100%;height:100%;object-fit:cover;display:block;}
.sp-card-glow{position:absolute;inset:0;}
.sp-card-badge{position:absolute;top:10px;right:10px;padding:4px 12px;border-radius:20px;font-size:7px;letter-spacing:.2em;text-transform:uppercase;}
.sp-card-name{position:absolute;bottom:0;left:0;right:0;padding:18px 12px 12px;background:linear-gradient(to top,rgba(0,0,0,.95),transparent);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.06em;color:#fff;text-align:center;}
.sp-cont{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);padding:12px 38px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;z-index:10;animation:spIn .7s ease 1.1s both;}

/* ALBUM SCREEN */
#album-screen{overflow-y:auto;align-items:flex-start;padding:44px 16px 110px;}
.alb-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:rgba(252,228,239,.9);width:100%;max-width:560px;}
.alb-title span{color:#e8457a;}
.alb-sub{font-size:6px;letter-spacing:.35em;text-transform:uppercase;color:#4a2838;margin-bottom:18px;width:100%;max-width:560px;}
.alb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%;max-width:560px;}
.ac{aspect-ratio:2/3;border-radius:6px;overflow:hidden;border:1px solid rgba(232,69,122,.1);background:#0f060c;position:relative;}
.ac.unlocked img{width:100%;height:100%;object-fit:cover;}
.ac.locked .bw{position:absolute;inset:0;}
.ac.locked .bw img{width:100%;height:100%;object-fit:cover;filter:blur(8px) brightness(.25);}
.ac.locked .li{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;}
.ac.locked .li span:first-child{font-size:15px;opacity:.45;}
.ac.locked .li span:last-child{font-size:5px;letter-spacing:.2em;text-transform:uppercase;color:#5a2840;}
.rb{position:absolute;bottom:0;left:0;right:0;height:2px;}
.ac.rarity-common .rb{background:#a0b0c0;}
.ac.rarity-rare .rb{background:#4090ff;}
.ac.rarity-epic .rb{background:#c060ff;}
.ac.rarity-legendary .rb{background:#f0c040;box-shadow:0 0 5px #f0c040;}
.btn-buy{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:13px 40px;background:#e8457a;color:#04020a;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;white-space:nowrap;box-shadow:0 0 34px rgba(232,69,122,.36);animation:bp 2.5s ease infinite;}
@keyframes bp{0%,100%{box-shadow:0 0 34px rgba(232,69,122,.33);}50%{box-shadow:0 0 60px rgba(232,69,122,.65);}}
@keyframes holoSweep{0%,100%{transform:translateX(-100%);}50%{transform:translateX(100%);}}
@keyframes rRot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="flash"></div>

<div class="screen" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-txt">Preparing your pack...</div>
</div>

<div class="screen hidden" id="special-screen">
  <div class="sp-rays" id="spRays"></div>
  <div class="sp-glow" id="spGlow"></div>
  <div class="sp-lbl"><div class="sp-type" id="spType"></div><div class="sp-name" id="spNameEl"></div></div>
  <div class="sp-card" id="spCard">
    <img id="spCardImg" src="/img/card-placeholder.jpg" alt="">
    <div class="sp-card-glow" id="spCardGlow"></div>
    <div class="sp-card-badge" id="spCardBadge"></div>
    <div class="sp-card-name" id="spCardName"></div>
  </div>
  <button class="sp-cont" id="spCont">Continue →</button>
</div>

<div class="screen hidden" id="cards-screen">
  <div class="card-area">
    <div class="card-3d" id="card3d">
      <div class="card-back-wrap" id="cardBackWrap"></div>
      <div class="card-face" id="cardFace">
        <img id="cardImg" src="/img/card-placeholder.jpg" alt="">
        <div class="card-glow"></div>
        <div class="card-badge" id="cardBadge"></div>
        <div class="card-bot" id="cardName"></div>
      </div>
    </div>
  </div>
  <div class="card-ctr" id="cardCtr"></div>
  <div class="dots" id="dots"></div>
  <button class="btn" id="btnNext">Reveal card →</button>
</div>

<div class="screen hidden" id="album-screen">
  <div class="alb-title">Your <span>Collection</span></div>
  <div class="alb-sub" id="albumSub">Season 01</div>
  <div class="alb-grid" id="albumGrid"></div>
  <button class="btn-buy" onclick="window.location.href='/'">🦂 Open another pack</button>
</div>

<script>
const RA={common:{l:'Common',c:'#a0b0c0',e:'⚪',cb:'cb-common',em:'🦂'},rare:{l:'Rare',c:'#4090ff',e:'🔵',cb:'cb-rare',em:'💎'},epic:{l:'Epic',c:'#c060ff',e:'🟣',cb:'cb-epic',em:'🔮'},legendary:{l:'Legendary',c:'#f0c040',e:'⭐',cb:'cb-legendary',em:'⭐'}};

// BG
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
bgC.width=window.innerWidth;bgC.height=window.innerHeight;
const pts=Array.from({length:55},()=>({x:Math.random()*bgC.width,y:Math.random()*bgC.height,s:Math.random()*1.5+.3,vy:-(Math.random()*.35+.1),op:Math.random()*.35+.1,life:Math.random()*200}));
(function ab(){bgX.clearRect(0,0,bgC.width,bgC.height);pts.forEach(p=>{bgX.save();bgX.globalAlpha=p.op;bgX.fillStyle='#e8457a';bgX.shadowBlur=8;bgX.shadowColor='#e8457a';bgX.beginPath();bgX.arc(p.x,p.y,p.s,0,Math.PI*2);bgX.fill();bgX.restore();p.y+=p.vy;p.life++;if(p.y<-5||p.life>260){p.y=bgC.height+5;p.x=Math.random()*bgC.width;p.life=0;}});requestAnimationFrame(ab);})();

// FETCH PACK FROM SERVER
const urlParams = new URLSearchParams(window.location.search);
const stripeSessionId = urlParams.get('session_id');
let packCards = [], currentCard = 0, cardFlipped = false;

async function loadPack() {
  try {
    const res = await fetch(`/api/payments/pack-data?session_id=${stripeSessionId}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');
    packCards = data.cards;
    currentCard = 0; cardFlipped = false;
    showScreen('cards-screen');
    renderCard(); renderDots();
  } catch(err) {
    document.getElementById('loading').innerHTML = `<div style="text-align:center;padding:40px"><div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:#e8457a;margin-bottom:12px">Error</div><div style="font-size:9px;letter-spacing:.2em;color:rgba(252,228,239,.4)">${err.message}</div><br><a href="/" style="color:#e8457a;font-size:9px;letter-spacing:.3em">← Back</a></div>`;
  }
}

// Load pack immediately
if(stripeSessionId) {
  // Small delay to let webhook process
  setTimeout(loadPack, 1500);
} else {
  window.location.href = '/';

    <div style="position:absolute;top:0;left:0;right:0;padding:8px 10px 18px;background:linear-gradient(to bottom,rgba(4,2,10,.85) 40%,transparent);text-align:center;z-index:5;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.2em;color:#fff;">MARTINA 🦂</div>
      <div style="font-size:5px;letter-spacing:.4em;text-transform:uppercase;margin-top:1px;color:rgba(232,69,122,.6);">Season 01 · spoilMartina</div>
    </div>
    <div style="position:absolute;width:12px;height:12px;top:10px;left:10px;border-top:1.5px solid ${cornerColors[rarity]};border-left:1.5px solid ${cornerColors[rarity]};z-index:5;"></div>
    <div style="position:absolute;width:12px;height:12px;top:10px;right:10px;border-top:1.5px solid ${cornerColors[rarity]};border-right:1.5px solid ${cornerColors[rarity]};z-index:5;"></div>
    <div style="position:absolute;width:12px;height:12px;bottom:10px;left:10px;border-bottom:1.5px solid ${cornerColors[rarity]};border-left:1.5px solid ${cornerColors[rarity]};z-index:5;"></div>
    <div style="position:absolute;width:12px;height:12px;bottom:10px;right:10px;border-bottom:1.5px solid ${cornerColors[rarity]};border-right:1.5px solid ${cornerColors[rarity]};z-index:5;"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:18px 12px 14px;background:linear-gradient(to top,rgba(4,2,10,.92) 55%,transparent);text-align:center;z-index:5;">
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:9px;line-height:1.5;color:${phraseColors[rarity]};${isLeg?'text-shadow:0 0 8px rgba(240,192,64,.3);':''}">${phrase}</div>
    </div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:${bars[rarity]};box-shadow:${barGlows[rarity]};z-index:6;"></div>
    <div style="position:absolute;inset:0;border-radius:12px;border:2px solid ${colors[rarity]};box-shadow:${glows[rarity]};"></div>
  </div>`;
}


function renderCard(){
  const c=packCards[currentCard],r=RA[c.rarity];
  document.getElementById('cardFace').className='card-face rarity-'+c.rarity;
  document.getElementById('card3d').className='card-3d rarity-'+c.rarity;
  document.getElementById('card3d').classList.remove('flipped');
  document.getElementById('cardBackWrap').innerHTML=buildBack(c.rarity);
  document.getElementById('cardBadge').textContent=r.e+' '+r.l;
  document.getElementById('cardBadge').style.color=r.c;
  document.getElementById('cardName').textContent=c.name;
  document.getElementById('cardCtr').textContent='Card '+(currentCard+1)+' of '+packCards.length;
  cardFlipped=false;
  document.getElementById('btnNext').textContent='Reveal card →';
}

function renderDots(){
  const d=document.getElementById('dots');d.innerHTML='';
  packCards.forEach((_,i)=>{const el=document.createElement('div');el.className='dot'+(i===currentCard?' on':'');d.appendChild(el);});
}

document.getElementById('btnNext').addEventListener('click',()=>{
  if(!cardFlipped){
    const rv=packCards[currentCard].rarity;
    if(rv==='legendary'||rv==='epic'){showSpecial(packCards[currentCard]);return;}
    document.getElementById('card3d').classList.add('flipped');cardFlipped=true;
    document.getElementById('btnNext').textContent=currentCard===packCards.length-1?'View album →':'Next card →';
  } else {
    if(currentCard<packCards.length-1){currentCard++;renderCard();renderDots();}
    else{ window.location.href = '/album'; }
  }
});

async function fetchAndShowAlbum(){
  showScreen('album-screen');
  try {
    const res = await fetch('/api/album');
    const data = await res.json();
    if(res.ok && data.cards) buildAlbum(data.cards);
    else buildAlbumFromPack();
  } catch { buildAlbumFromPack(); }
}

function buildAlbumFromPack(){
  const rp=['common','common','common','rare','rare','epic','legendary'];
  const mockOwned = packCards;
  buildAlbum(mockOwned);
}

function buildAlbum(ownedCards){
  const g=document.getElementById('albumGrid');g.innerHTML='';
  const sub = document.getElementById('albumSub');
  sub.textContent = `Season 01 · ${ownedCards.length} cards collected`;
  const rp=['common','common','common','rare','rare','epic','legendary'];
  for(let i=0;i<45;i++){
    const cardId = `card_${i+1}`;
    const o = ownedCards.find(c => c.card_id === cardId || c.id === cardId);
    const rarity=o?o.rarity:rp[Math.floor(Math.random()*rp.length)];
    const d=document.createElement('div');d.className=`ac rarity-${rarity} ${o?'unlocked':'locked'}`;
    if(o){ const img=document.createElement('img');img.src=`/img/cards/${o.card_id || cardId}.jpg`;img.onerror=()=>img.src='/img/card-placeholder.jpg';d.appendChild(img); }
    else d.innerHTML=`<div class="bw"><img src="/img/card-placeholder.jpg"></div><div class="li"><span>🔒</span><span>#${String(i+1).padStart(2,'0')}</span></div>`;
    const rb=document.createElement('div');rb.className='rb';d.appendChild(rb);
    g.appendChild(d);
  }
}

function showSpecial(card){
  const isLeg=card.rarity==='legendary';const r=RA[card.rarity];
  document.getElementById('spRays').className='sp-rays '+(isLeg?'gold':'purple');
  document.getElementById('spGlow').className='sp-glow '+(isLeg?'gold':'purple');
  document.getElementById('spType').textContent=r.e+' '+r.l+' '+r.e;
  document.getElementById('spType').style.color=r.c;
  document.getElementById('spNameEl').textContent=card.name;
  document.getElementById('spNameEl').style.color=r.c;
  const sc=document.getElementById('spCard');
  sc.style.border=`2px solid ${r.c}`;
  sc.style.boxShadow=isLeg?'0 0 60px rgba(240,192,64,.45),0 0 100px rgba(240,192,64,.15)':'0 0 50px rgba(192,96,255,.4),0 0 80px rgba(192,96,255,.12)';
  document.getElementById('spCardGlow').style.background=isLeg?'linear-gradient(135deg,rgba(240,192,64,.2),transparent)':'linear-gradient(135deg,rgba(192,96,255,.2),transparent)';
  document.getElementById('spCardBadge').textContent=r.e+' '+r.l;
  document.getElementById('spCardBadge').style.cssText=`color:${r.c};background:rgba(${isLeg?'240,192,64':'192,96,255'},.12);border:1px solid ${r.c};padding:4px 12px;border-radius:20px;font-size:7px;letter-spacing:.2em;text-transform:uppercase;`;
  document.getElementById('spCardName').textContent=card.name;
  const cont=document.getElementById('spCont');cont.style.background=r.c;cont.style.color='#04020a';
  for(let i=0;i<50;i++)setTimeout(()=>spawnSparkle(window.innerWidth/2,window.innerHeight/2),Math.random()*1200);
  showScreen('special-screen');
}

document.getElementById('spCont').addEventListener('click',()=>{
  cardFlipped=true;showScreen('cards-screen');
  document.getElementById('card3d').classList.add('flipped');
  document.getElementById('btnNext').textContent=currentCard===packCards.length-1?'View album →':'Next card →';
});

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function spawnSparkle(x,y){
  const s=document.createElement('div');s.className='sparkle';
  s.textContent=['✨','⭐','💫','🌟','✦','💎','🔥'][Math.floor(Math.random()*7)];
  const a=Math.random()*Math.PI*2,d=50+Math.random()*160;
  s.style.cssText=`left:${x}px;top:${y}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${Math.random()*.4}s;`;
  document.body.appendChild(s);setTimeout(()=>s.remove(),1100);
}
</script>
</body>
</html>
